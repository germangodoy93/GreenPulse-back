[tool.mypy]
python_version = "3.13"
strict = true
ignore_missing_imports = true
exclude = ["alembic/", "tests/"]
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["jose.*", "passlib.*", "bleach.*", "slowapi.*", "loguru.*"]
ignore_missing_imports = true

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true

# ─── Ruff ─────────────────────────────────────────────────────────────────────
[tool.ruff]
target-version = "py311"
line-length = 88
src = ["src", "config", "tests"]

[tool.ruff.lint]
select = [
  "E", "W",   # pycodestyle
  "F",        # pyflakes
  "I",        # isort
  "N",        # pep8-naming
  "UP",       # pyupgrade
  "B",        # flake8-bugbear
  "S",        # flake8-bandit (security)
  "ANN",      # flake8-annotations
  "SIM",      # flake8-simplify
  "RET",      # flake8-return
  "PTH",      # flake8-use-pathlib
  "G",        # flake8-logging-format
  "TRY",      # tryceratops
  "RUF",      # Ruff-specific
]
ignore = [
  "ANN101",   # Missing type annotation for `self`
  "ANN102",   # Missing type annotation for `cls`
  "TRY003",   # Avoid specifying long messages in raise
  "S101",     # Use of `assert` detected (needed in tests)
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "ANN", "S105", "S106"]
"alembic/**" = ["ANN", "N999"]

[tool.ruff.lint.isort]
known-first-party = ["src", "config"]

# ─── Black ────────────────────────────────────────────────────────────────────
[tool.black]
target-version = ["py311"]
line-length = 88

# ─── Pytest ───────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
testpaths = ["tests"]
pythonpath = ["."]
addopts = "--cov=src --cov-report=term-missing --cov-fail-under=80"
filterwarnings = [
  "ignore::DeprecationWarning:jose",
]

[tool.coverage.run]
source = ["src"]
omit = ["*/tests/*", "alembic/*", "*/__init__.py"]

[tool.coverage.report]
fail_under = 80
show_missing = true
skip_covered = false
